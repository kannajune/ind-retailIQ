version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: retailiq-postgres
    environment:
      POSTGRES_USER: retailiq_user
      POSTGRES_PASSWORD: retailiq_password
      POSTGRES_DB: retailiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailiq_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: retailiq-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@retailiq.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
